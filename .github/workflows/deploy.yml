name: Deploy to AWS S3

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual runs

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync files to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }} \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --exclude ".DS_Store" \
            --exclude ".env" \
            --exclude ".gitignore" \
            --exclude ".claude/*" \
            --cache-control "max-age=86400" \
            --delete

      - name: Set proper content types
        run: |
          # Set HTML files with proper content type and no cache for dynamic content
          aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --content-type "text/html" \
            --cache-control "max-age=300" \
            --metadata-directive REPLACE

          # Set CSS files with longer cache
          aws s3 sync s3://${{ secrets.S3_BUCKET_NAME }} s3://${{ secrets.S3_BUCKET_NAME }} \
            --exclude "*" \
            --include "*.css" \
            --content-type "text/css" \
            --cache-control "max-age=31536000" \
            --metadata-directive REPLACE

          # Set JS files with longer cache
          aws s3 sync s3://${{ secrets.S3_BUCKET_NAME }} s3://${{ secrets.S3_BUCKET_NAME }} \
            --exclude "*" \
            --include "*.js" \
            --content-type "application/javascript" \
            --cache-control "max-age=31536000" \
            --metadata-directive REPLACE

          # Set image files with long cache
          aws s3 sync s3://${{ secrets.S3_BUCKET_NAME }} s3://${{ secrets.S3_BUCKET_NAME }} \
            --exclude "*" \
            --include "*.png" \
            --include "*.jpg" \
            --include "*.jpeg" \
            --include "*.gif" \
            --include "*.svg" \
            --cache-control "max-age=31536000" \
            --metadata-directive REPLACE

      - name: Invalidate CloudFront cache
        if: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment complete
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Site deployed to S3 bucket: ${{ secrets.S3_BUCKET_NAME }}"
          if [ -n "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
            echo "🚀 CloudFront cache invalidated for distribution: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          fi