AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  t12n.ai API — conversational icebreaker + turns backend.
  HTTP API Gateway backed by Lambda + DynamoDB.

Parameters:
  AcmCertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN for api.t12n.ai (must be in us-east-1)

  ApiDomainName:
    Type: String
    Default: "api.t12n.ai"
    Description: Custom domain for the API

Globals:
  Function:
    Runtime: python3.12
    Architectures: [arm64]
    MemorySize: 512
    Timeout: 30
    Tracing: PassThrough
    Environment:
      Variables:
        ICEBREAKERS_TABLE: !Ref IcebreakersTable
        TURNS_TABLE: !Ref ConversationTurnsTable
        POWERTOOLS_SERVICE_NAME: t12n-api
        LOG_LEVEL: INFO

Resources:
  # ── DynamoDB Tables ─────────────────────────────────────────────────────────

  IcebreakersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: icebreakers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: icebreaker_id
          AttributeType: S
        - AttributeName: is_active
          AttributeType: S
      KeySchema:
        - AttributeName: icebreaker_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: is_active-index
          KeySchema:
            - AttributeName: is_active
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  ConversationTurnsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: conversation_turns
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: conversation_id
          AttributeType: S
        - AttributeName: order
          AttributeType: N
      KeySchema:
        - AttributeName: conversation_id
          KeyType: HASH
        - AttributeName: order
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  # ── Lambda Function ──────────────────────────────────────────────────────────

  T12nApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: t12n-api
      CodeUri: src/
      Handler: api/app.handler
      ReservedConcurrentExecutions: 10
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IcebreakersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConversationTurnsTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref T12nHttpApi

  # ── HTTP API ─────────────────────────────────────────────────────────────────

  T12nHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 3000

  # ── Custom Domain ────────────────────────────────────────────────────────────

  ApiCustomDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: HasCertificate
    Properties:
      DomainName: !Ref ApiDomainName
      DomainNameConfigurations:
        - CertificateArn: !Ref AcmCertificateArn
          EndpointType: REGIONAL

  ApiDomainMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: HasCertificate
    DependsOn: ApiCustomDomain
    Properties:
      ApiId: !Ref T12nHttpApi
      DomainName: !Ref ApiDomainName
      Stage: $default

  # ── EventBridge Warmup ───────────────────────────────────────────────────────

  WarmupRule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: rate(5 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt T12nApiFunction.Arn
          Id: Warmup
          Input: '{"source": "warmup"}'

  WarmupPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref T12nApiFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WarmupRule.Arn

Conditions:
  HasCertificate: !Not [!Equals [!Ref AcmCertificateArn, ""]]

Outputs:
  ApiEndpoint:
    Value: !Sub "https://${T12nHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
    Description: HTTP API endpoint URL

  ApiCustomDomainTarget:
    Condition: HasCertificate
    Value: !GetAtt ApiCustomDomain.RegionalDomainName
    Description: CNAME target for Cloudflare DNS (gray cloud / proxy OFF)
